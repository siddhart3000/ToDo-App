name: todo_firebase_app
description: "Professional ToDo App with Firebase and Riverpod"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  firebase_storage: ^12.3.2
  flutter_riverpod: ^2.5.1
  http: ^1.2.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  uuid: ^4.4.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  permission_handler: ^11.3.1
  fl_chart: ^0.66.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo.jpg.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
